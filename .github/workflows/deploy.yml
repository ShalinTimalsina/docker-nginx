name: CI CD pipeline 


# This is the events that is going to trigger this whole workflow.
on: 
  push:
    branches: [ 'main']
  
jobs:

# Each jobs is going to run on a seperate machine

# This is just the identifier or the name of the job
  Compile: 
  #  This is where the Pipeline is going to run (Shared runner)
    runs-on: self-hosted 
    # Now the steps are defined inside
    steps:   
    # Codes are going to be pulled inside the runner
    - name: Checkout Repo in the runner  
    # Uses the pre-defined actions from the marketplace
      uses: actions/checkout@v6.0.2

    - name: Setup Nodejs 
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install Dependencies
      run: npm install 
         
    - name: Run the express server ,health check and stop the express server.
      run:  | 
         node server.js & SERVER_PID=$!
         sleep 5 
         curl http://localhost:3000/health
         kill $SERVER_PID

  
  Security: 
    
    needs: Compile
    runs-on: self-hosted

    steps:
      - name: Checkout the Code 
        uses: actions/checkout@v6.0.2

     
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ARGS: >
            detect
            --source .
            --report-path gitleaks-report.json
            --report-format json
            --exit-code 1
                  
  Tests: 
    needs: Security
    runs-on: self-hosted
    steps:

      - name:  Checkout the Code 
        uses: actions/checkout@v6.0.2

      - name: Setup Nodejs 
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install 
        env:
          NODE_ENV: development

      - name: Unit Test cases
        run: npm test   

  Sonar-Scan:
    needs: Tests
    runs-on: self-hosted

    steps:

      - name:  Checkout the Code 
        uses: actions/checkout@v6.0.2

      - name: Setup Nodejs 
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install 
        env:
          NODE_ENV: development

      - name: Unit Test cases
        run: npm test   

      
      - name: Build Sonar Scan 
        uses: actions/checkout@v6
        with:
          # Disabling shallow clones is recommended for improving the relevancy of reporting
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0 
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{secrets.SONAR_HOST_URL}}

        # Check the Quality Gate status.
      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} 
          
  Docker:
    needs: Sonar-Scan
    runs-on: self-hosted

    steps:
      - name:  Checkout the Code 
        uses: actions/checkout@v6.0.2

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: shalintim/node-app:latest
  Deploy:
    needs: Docker
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2

      
      - name: Deploy Via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.SSH_HOST}}
          username: ubuntu
          key: ${{secrets.SSH_PRIVATE_KEY}}
          script: |
            cd /home/ubuntu/docker-nginx
            
            git fetch origin
            git reset --hard origin/main

            docker compose pull
            docker compose up -d --remove-orphans
