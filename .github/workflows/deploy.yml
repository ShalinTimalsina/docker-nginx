name: CI CD pipeline 


# This is the events that is going to trigger this whole workflow.
on: 
  push:
    branches: [ 'main']
  
jobs:

# Each jobs is going to run on a seperate machine

# This is just the identifier or the name of the job
  Compile: 
  #  This is where the Pipeline is going to run (Shared runner)
    runs-on: self-hosted 
    # Now the steps are defined inside
    steps:   
    # Codes are going to be pulled inside the runner
    - name: Checkout Repo in the runner  
    # Uses the pre-defined actions from the marketplace
      uses: actions/checkout@v6.0.2

    - name: Setup Nodejs 
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install Dependencies
      run: npm install 
         
    - name: Run the express server ,health check and stop the express server.
      run:  | 
         node server.js & SERVER_PID=$!
         sleep 5 
         curl http://localhost:3000/health
         kill $SERVER_PID

  
  Security: 
    
    needs: Compile
    runs-on: self-hosted

    steps:
      - name: Checkout the Code 
        uses: actions/checkout@v6.0.2

     
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ARGS: >
            detect
            --source .
            --report-path gitleaks-report.json
            --report-format json
            --exit-code 1
                  
  Tests: 
    needs: Security
    runs-on: self-hosted
    steps:

      - name: Setup Nodejs 
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install 

      - name:  Checkout the Code 
        uses: actions/checkout@v6.0.2


      - name: Unit Test cases
        run: npm test 