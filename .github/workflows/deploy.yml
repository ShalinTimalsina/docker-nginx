name: CI CD pipeline 


# This is the events that is going to trigger this whole workflow.
on: 
  push:
    branches: [ 'main']
  
jobs:

# Each jobs is going to run on a seperate machine

# This is just the identifier or the name of the job
  Compile: 
  #  This is where the Pipeline is going to run (Shared runner)
    runs-on: self-hosted 
    # Now the steps are defined inside
    steps:   
    # Codes are going to be pulled inside the runner
    - name: Checkout Repo in the runner  
    # Uses the pre-defined actions from the marketplace
      uses: actions/checkout@v6.0.2

    - name: Setup Nodejs 
      uses: actions/setup-node@v6
      with:
        node-version: 24

    - name: Install Dependencies
      run: npm install 
         
    - name: Run the express server ,health check and stop the express server.
      run:  | 
         node server.js & SERVER_PID=$!
         sleep 5 
         curl http://localhost:3000/health
         kill $SERVER_PID

  
  Security: 
    
    needs: Compile
    runs-on: self-hosted

    steps:
      - name: Checkout the Code 
        uses: actions/checkout@v6.0.2

      - name: Trivy Installation 
        run : |
          sudo apt-get update -y
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy 
          
      - name: Trivy FS scan
        run : |
          trivy fs --format table -o fs-report.json . 

      - name: Gitleaks Installation
        run: | 
          sudo apt install gitleaks -y 

      - name: Gitleaks Scann
        run: gitleaks detect source  . -r gitleaks-report.json -f json 

