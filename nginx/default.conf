# --------------------------------
# Upstream (Node.js containers)
# --------------------------------
upstream nodejs_cluster {
    least_conn;
    server node-app:3000;
}

# --------------------------------
# HTTP (Port 80) - Challenge + Redirect
# --------------------------------
server {
    listen 80;
    server_name app.shalintimalsina.com.np www.app.shalintimalsina.com.np;

    # Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --------------------------------
# HTTPS (Port 443) - SSL + Proxy
# --------------------------------
server {
    listen 443 ssl;
    server_name app.shalintimalsina.com.np www.app.shalintimalsina.com.np;

    ssl_certificate     /etc/letsencrypt/live/app.shalintimalsina.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.shalintimalsina.com.np/privkey.pem;

    # Hide server info
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Remove backend hints
    add_header Server "" always;
    add_header X-Powered-By "" always;

    location / {
        proxy_pass http://nodejs_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
